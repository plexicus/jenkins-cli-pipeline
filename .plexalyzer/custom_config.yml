# Plexalyzer scan configuration
# Place this file at .plexalyzer/custom_config.yml in the repository you want to scan.
#
# parse_config() in plexalyzer/analyze.py merges every key here (except the
# reserved keys message_url and plexalyzer_token) directly into the scan
# arguments.  Those two reserved keys MUST be supplied as environment variables
# (PLEXALYZER_TOKEN and MESSAGE_URL) — not in this file.
#
# Valid individual tool names  (shared/tool_bundle_params.py  TOOL_CATEGORIES):
#
#   Category    Bundle name           Tool names
#   ----------  --------------------  ------------------------------------
#   SAST          plexicus-sast
#   SCA           plexicus-sca
#   Secrets       plexicus-secrets
#   Container     plexicus-container
#   IaC           plexicus-iac
#   CI/CD         plexicus-cicd
#   Cloud         plexicus-cloud
#   DAST          plexicus-dast
#   Pentest       plexicus-pentest
#   SBOM          plexicus-sbom
#   AI BOM        plexicus-aibom
#   Crypto BOM    plexicus-cbom
#   License       plexicus-license
#   SCM           plexicus-scm
#   Registry      plexicus-registry
#
# You may use either individual tool names or bundle names in excluded_tools /
# included_tools.

# Tools to skip — remove entries you want to run.
excluded_tools:
  - plexicus-pentest          # Pentest engine: slow, requires network access
  - plexicus-cloud    # Cloud security: only useful when scanning cloud configs
  - plexicus-aibom   # AI/ML BOM: only relevant for ML projects

# Uncomment and populate to restrict the scan to specific tools only.
# included_tools:
#   - plexicus-sast
#   - plexicus-sca
#   - plexicus-secrets
#   - plexicus-license
#   - plexicus-sbom
